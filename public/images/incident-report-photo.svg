<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 300"
  role="img"
  aria-label="Out-of-focus jobsite photo showing muted concrete and scaffolding shapes with a blurred amber hi-vis smear"
>
  <title>Blurry jobsite incident photo</title>
  <defs>
    <linearGradient id="bg-muddy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a7266" />
      <stop offset="45%" stop-color="#645d52" />
      <stop offset="100%" stop-color="#443f38" />
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="46%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.38" />
    </radialGradient>
    <filter id="photo-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" />
    </filter>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" />
    </filter>
  </defs>

  <rect x="0" y="0" width="400" height="300" fill="url(#bg-muddy)" />

  <g filter="url(#photo-blur)">
    <!-- indistinct concrete-block / scaffolding shapes -->
    <rect x="18" y="150" width="150" height="86" fill="#8a8478" transform="rotate(-4 93 193)" opacity="0.75" />
    <rect x="150" y="120" width="120" height="150" fill="#565049" transform="rotate(3 210 195)" opacity="0.7" />
    <rect x="252" y="70" width="70" height="210" fill="#9a9182" transform="rotate(-2 287 175)" opacity="0.55" />
    <rect x="-20" y="40" width="90" height="200" fill="#3d3831" transform="rotate(6 25 140)" opacity="0.5" />

    <!-- diagonal pole / scaffolding line suggestion -->
    <rect x="40" y="-10" width="10" height="320" fill="#2f2b26" transform="rotate(11 45 150)" opacity="0.4" />
    <rect x="300" y="-20" width="8" height="340" fill="#2f2b26" transform="rotate(-9 304 150)" opacity="0.35" />

    <!-- vertical amber / hi-vis smear -->
    <ellipse cx="215" cy="168" rx="26" ry="98" fill="#c9822f" transform="rotate(8 215 168)" opacity="0.8" />
    <ellipse cx="222" cy="150" rx="14" ry="60" fill="#e0a446" transform="rotate(6 222 150)" opacity="0.55" />
  </g>

  <g filter="url(#soft-blur)">
    <ellipse cx="120" cy="230" rx="60" ry="18" fill="#241f1a" opacity="0.3" />
  </g>

  <rect x="0" y="0" width="400" height="300" fill="url(#vignette)" />
</svg>
